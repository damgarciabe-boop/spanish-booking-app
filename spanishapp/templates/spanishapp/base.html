<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spanish Lessons One to One{% endblock %}</title>
</head>
<body>

    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="/about/">About Us</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>© 2026 Spanish Lessons</p>
    </footer>

</body>
</html>
